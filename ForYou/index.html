<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Para Sasa 💜</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #2a003f, #000);
  color: #fff;
  font-family: Arial;
  overflow-x: hidden;
}

/* ===== GLITCH ===== */
#glitchScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  cursor: pointer;
}

.glitch-text {
  font-size: 3rem;
  color: #c77dff;
  text-shadow: 0 0 10px #7b2cbf;
  position: relative;
  animation: flicker 1.2s infinite;
}

.hint { color:#aaa; margin-top:10px; }

@keyframes flicker {
  0%,100%{opacity:1;}
  50%{opacity:.5;}
}

/* ===== MAIN ===== */
.container-main {
  max-width: 900px;
  margin: auto;
  padding: 30px;
  text-align: center;
}

h1 { color:#c77dff; text-shadow:0 0 15px #7b2cbf; }

.card-romantic {
  background: rgba(123,44,191,.15);
  border:1px solid rgba(199,125,255,.4);
  padding:30px;
  border-radius:20px;
}

/* buttons */
.btn-romantic {
  border-radius:30px;
  padding:10px 25px;
}

/* hearts */
.heart {
  position: fixed;
  top: -10px;
  color: #c77dff;
  animation: fall linear forwards;
  z-index: 9998;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

/* final screen */
#ending {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 99999;
  text-align: center;
}

#ending h1 {
  color:#c77dff;
  font-size:3rem;
}
</style>
</head>

<body>

<!-- GLITCH -->
<div id="glitchScreen">
  <div class="glitch-text">SASA...</div>
  <div class="hint">clique para entrar</div>
</div>

<!-- ENDING -->
<div id="ending">
  <h1>💜 GOOD ENDING UNLOCKED 💜</h1>
  <p>Você aceitou o melhor bug da minha vida.</p>
</div>

<!-- SPOTIFY -->
<div style="height:152px;">
<iframe src="https://open.spotify.com/embed/track/1tIJba7S9uHsNml4BqZrah"
style="width:100%;height:100%;border:0;border-radius:12px;"></iframe>
</div>

<div class="container-main">
  <h1>Oi, Sasa 💜</h1>

  <div class="card-romantic">
    <p>Desde que você apareceu, tudo ficou mais bonito.</p>

    <h2>Quer namorar comigo? 💜</h2>

    <button class="btn btn-success btn-romantic" id="btnYes">Sim 💜</button>
    <button class="btn btn-outline-light btn-romantic" id="btnNo">Não</button>

    <div id="msgYes" style="display:none;margin-top:15px;color:#c77dff;">
      Eu sabia 😭💜
    </div>

    <div id="msgNo" style="display:none;margin-top:15px;">
      Tudo bem… ainda vou tentar 😔
    </div>
  </div>
</div>

<script>
$(function () {

  let escapes = 0;
  let noLocked = false;

  // ===== GLITCH ENTER =====
  $("#glitchScreen").click(function () {
    $(this).fadeOut();
  });

  setTimeout(() => $("#glitchScreen").fadeOut(), 4000);

  // ===== YES =====
  $("#btnYes").click(function () {

    $("#msgYes").fadeIn();
    $("#msgNo").hide();

    // vibração mobile
    if (navigator.vibrate) {
      navigator.vibrate([200,100,200]);
    }

    startHearts();

    setTimeout(() => {
      $("#ending").fadeIn();
    }, 1500);
  });

  // ===== NO ESCAPA =====
  $("#btnNo").on("mouseenter click touchstart", function () {
    if (noLocked) return;

    escapes++;

    if (escapes >= 10) {
      noLocked = true;
      $("#btnNo").text("talvez... 💜").removeClass("btn-outline-light").addClass("btn-success");
      return;
    }

    moveButton();
  });

  function moveButton() {
    const btn = $("#btnNo");

    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    btn.css({
      position: "fixed",
      left: x + "px",
      top: y + "px",
      transition: "0.2s"
    });
  }

  // ===== HEART RAIN =====
  function startHearts() {
    setInterval(() => {
      const heart = $("<div>💜</div>");
      heart.addClass("heart");

      heart.css({
        left: Math.random() * window.innerWidth + "px",
        fontSize: (10 + Math.random() * 20) + "px",
        animationDuration: (2 + Math.random() * 3) + "s"
      });

      $("body").append(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 150);
  }

});
</script>

</body>
</html>
