<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HenriqueOS v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text x=%220%22 y=%2212%22 font-size=%2216%22>$</text></svg>">

    <style>
        :root {
            --term-green: #4af626;
            --term-dim: #278114;
            --term-bg: #0a0a0a;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Fira Code', 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            padding: 25px;
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--term-dim) var(--term-bg);
        }

        .line {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .command-output {
            margin-bottom: 12px;
            color: #d1d1d1;
        }

        #input-line {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .prompt-symbol {
            color: var(--term-green);
            font-weight: bold;
        }

        .cmd-input {
            background: transparent;
            color: var(--term-green);
            border: none;
            outline: none;
            flex: 1;
            font-family: inherit;
            font-size: 1rem;
            caret-color: var(--term-green);
        }

        a {
            color: #5bc0de;
            text-decoration: none;
            border-bottom: 1px dashed #5bc0de;
        }

        a:hover {
            color: var(--term-green);
            border-bottom: 1px solid var(--term-green);
        }

        /* CRT Scanline effect */
        #terminal::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .ascii-art {
            color: var(--term-green);
            line-height: 1.1;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script>
$(function(){
    const terminal = $("#terminal");
    let sudoMode = false;
    let history = [];
    let historyIndex = 0;

    // Cálculo automático de idade (Março de 2006)
    const birthDate = new Date('2006-03-09');
    const age = Math.floor((new Date() - birthDate) / 31557600000);

    const files = {
        "readme.txt": "HenriqueOS v2.0.0-stable. Foco em Low Level e Engenharia Reversa.",
        "kernel_panic.log": "Error: User is too curious. System stable anyway.",
        "todo.md": "- [ ] Finalizar projeto C\n- [ ] Estudar Assembly x86_64\n- [ ] Customizar kernel Arch"
    };

    const projects = [
        { name: "Projetos GitHub", link: "https://github.com/hc8841", desc: "Meus repositórios de código e estudos." },
        { name: "Certificados", link: "https://drive.google.com/drive/folders/1k7mJwBy7egEE-h_HCGNXxc6mR8M9QGmY", desc: "Minha formação técnica e cursos." }
    ];

    const responses = {
        help: () => `Comandos disponíveis:
  about        - Sobre mim
  skills       - Minhas capacidades técnicas
  projects     - O que ando desenvolvendo
  experience   - Trajetória profissional
  contact      - Como me encontrar
  neofetch     - Status do sistema
  ls           - Listar arquivos virtuais
  cat <file>   - Ler um arquivo
  clear        - Limpar tela
  sudo         - Modo root
  exit         - Sair/Resetar`,

        about: () => `
Nome: Henrique Eslabão da Fonseca Chaves
Idade: ${age} anos
Local: São Bento do Sul, SC
Formação: Técnico em Informática (2023)

Entusiasta de sistemas operacionais, hardware e programação de baixo nível (C/Assembly). 
Atualmente focando em Segurança da Informação e Administração de Sistemas Linux (Arch Linux).`,

        skills: () => `
[Hardware]
  - Manutenção avançada e eletrônica de componentes
  - Montagem de servidores e infraestrutura local
[Software/Dev]
  - Linguagens: C, Assembly, Python
  - OS: Arch Linux (Advanced User), Windows Server
  - Ferramentas: Bash Scripting, Git, Flipper Zero (Security Study)
[Soft Skills]
  - Raciocínio analítico
  - Liderança técnica e comunicação clara`,

        experience: () => `
Minha base profissional foi construída em funções operacionais que exigem disciplina e foco.

- Condor S/A (Ajudante de Carga)
- Raia Drogasil (Atendente)
- SDB Alimentos (Caixa)

*Destaque: Utilizo estas experiências como prova de comprometimento enquanto busco minha primeira vaga técnica.*`,

        contact: () => `
Email: <a href="mailto:henriquemattos841@gmail.com">henriquemattos841@gmail.com</a>
GitHub: <a href="https://github.com/hc8841" target="_blank">github.com/hc8841</a>
LinkedIn: <a href="https://linkedin.com/in/henrique-chaves-448288300" target="_blank">linkedin/in/henrique-chaves</a>`,

        projects: () => {
            let p = "Projetos e Links Importantes:\n";
            projects.forEach(item => {
                p += `- <a href="${item.link}" target="_blank">${item.name}</a>: ${item.desc}\n`;
            });
            return p;
        },

        neofetch: () => `
<div class="ascii-art">
  _    _                _             _      ____   _____ 
 | |  | |              (_)           | |    / __ \ / ____|
 | |__| | ___ _ __  _ __ _  __ _ _   _  ___| |  | | (___  
 |  __  |/ _ \ '_ \| '__| |/ _\` | | | |/ _ \ |  | |\___ \ 
 | |  | |  __/ | | | |  | | (_| | |_| |  __/ |__| |____) |
 |_|  |_|\___|_| |_|_|  |_|\__, |\__,_|\___|\____/|_____/ 
                            __/ |                         
                           |___/                          
</div>
<b>OS:</b> HenriqueOS v2.0 (Arch-based)
<b>Kernel:</b> 6.x-zen-custom
<b>Shell:</b> henrique-bash
<b>Uptime:</b> desde o boot
<b>CPU:</b> Logic & Passion 4.0GHz
<b>Memory:</b> Coffee-driven 32GB`,

        whoami: () => sudoMode ? "root" : "henrique"
    };

    function print(text, isOutput = false) {
        const div = $("<div>").addClass("line");
        if (isOutput) div.addClass("command-output");
        div.html(text.replace(/\n/g, "<br>"));
        terminal.append(div);
        terminal.scrollTop(terminal[0].scrollHeight);
    }

    function bootSequence() {
        const bootMessages = [
            "Initializing HenriqueOS v2.0.0...",
            "Loading Linux Kernel 6.8.9-zen...",
            "Checking hardware modules... OK",
            "Mounting /home/henrique... OK",
            "Starting services: [Network] [SSH] [Security]",
            "Welcome, Henrique. Type 'help' to start.",
            " "
        ];

        let i = 0;
        function showNext() {
            if (i < bootMessages.length) {
                print(bootMessages[i]);
                i++;
                setTimeout(showNext, 150);
            } else {
                newPrompt();
            }
        }
        showNext();
    }

    function newPrompt() {
        const symbol = sudoMode ? "#" : "$";
        const promptContainer = $("<div id='input-line' class='line'>");
        promptContainer.append(`<span class='prompt-symbol'>${symbol}</span>`);
        const input = $("<input class='cmd-input' spellcheck='false' autocomplete='off'>");
        promptContainer.append(input);
        terminal.append(promptContainer);
        input.focus();

        input.on("keydown", function(e) {
            if (e.key === "Enter") {
                const cmd = input.val().trim();
                handleCommand(cmd);
                e.preventDefault();
            } else if (e.key === "ArrowUp") {
                if (historyIndex > 0) input.val(history[--historyIndex]);
                e.preventDefault();
            } else if (e.key === "Tab") {
                const current = input.val();
                const matches = Object.keys(responses).concat(Object.keys(files)).filter(c => c.startsWith(current));
                if (matches.length === 1) input.val(matches[0]);
                e.preventDefault();
            }
        });
    }

    function handleCommand(cmdText) {
        const historyLine = $("<div class='line'>").html(`<span class='prompt-symbol'>${sudoMode ? "#" : "$"}</span> ${cmdText}`);
        $("#input-line").replaceWith(historyLine);
        
        if (cmdText !== "") {
            history.push(cmdText);
            historyIndex = history.length;
        }

        const parts = cmdText.split(" ");
        const cmd = parts[0].toLowerCase();
        const arg = parts[1];

        if (cmd === "clear") {
            terminal.empty();
        } else if (cmd === "ls") {
            print(Object.keys(files).join("    "), true);
        } else if (cmd === "cat") {
            if (files[arg]) print(files[arg], true);
            else print("cat: " + (arg ? arg + ": Arquivo não encontrado" : "faltando argumento"), true);
        } else if (cmd === "sudo") {
            sudoMode = true;
            print("Access granted. Welcome, root.", true);
            $("#favicon").attr("href", "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text x=%220%22 y=%2212%22 font-size=%2216%22>#</text></svg>");
        } else if (cmd === "exit") {
            if (sudoMode) {
                sudoMode = false;
                print("Privilégios root revogados.", true);
                $("#favicon").attr("href", "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text x=%220%22 y=%2212%22 font-size=%2216%22>$</text></svg>");
            } else {
                print("Reiniciando sessão...", true);
                setTimeout(() => location.reload(), 1000);
                return;
            }
        } else if (responses[cmd]) {
            print(responses[cmd](), true);
        } else if (cmd !== "") {
            print(`Comando não encontrado: ${cmd}. Digite 'help' para ver a lista.`, true);
        }

        newPrompt();
    }

    bootSequence();
});
</script>
</body>
</html>
